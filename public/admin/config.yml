backend:
  name: github
  repo: chuyendoiso-ctump/mica
  branch: main
  base_url: https://micaheart.org
  auth_endpoint: api/auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "public/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Image", name: "image", widget: "image"}
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Tag", name: "tag", widget: "list", field: {label: "Tag", name: "tag", widget: "string"} }
      - { label: "Title", name: "title", widget: "text" }
      - { label: "Body", name: "body", widget: "tinymce" }